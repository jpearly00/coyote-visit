<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Coyote’s Outpost — Parked</title>
<style>
  :root {
    --brand-auburn: #8C4028;
    --brand-sunset: #E08D63;
    --brand-cream:  #F7F5F0;
    --brand-dark:   #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--brand-cream);
    color: var(--brand-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    line-height: 1.5;
  }
  .card {
    max-width: 540px;
    width: 100%;
    background: #fff;
    padding: 3rem 2.5rem 2.5rem;
    border-radius: 6px;
    border-top: 4px solid var(--brand-auburn);
    box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    text-align: center;
  }
  .kicker {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brand-auburn);
    margin-bottom: 1.2rem;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--brand-dark);
    margin-bottom: 1.4rem;
    line-height: 1.3;
  }
  .message {
    font-size: 1.05rem;
    color: #333;
    margin-bottom: 1.8rem;
    font-style: italic;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #ccc;
    margin: 0 auto 1.6rem;
  }
  .contact {
    font-size: 0.95rem;
    color: #444;
  }
  .contact a {
    color: var(--brand-auburn);
    text-decoration: none;
    font-weight: 600;
  }
  .contact a:hover { text-decoration: underline; }
  .footer {
    margin-top: 2rem;
    padding-top: 1.2rem;
    border-top: 1px solid #eee;
    font-size: 0.78rem;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<main class="card">
  <div class="kicker">Coyote's Outpost · Moab Mercantile</div>
  <h1>Coyote’s Outpost</h1>
  <p class="message">Rounds nearing completion.<br>Please contact for updated information.</p>
  <div class="divider"></div>
  <div class="contact">
    John Early<br>
    <a href="mailto:jpearly@gmail.com">jpearly@gmail.com</a><br>
    <a href="tel:+14352608260">435-260-8260</a>
  </div>
  <div class="footer">Moab, Utah</div>
</main>
</body>
</html>
